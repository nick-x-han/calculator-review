<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css"></style>
</head>
<body>
    <div class="calculator">
        <span id="display">0</span>
        <div class="buttons">
            <div class="middle">
                <!-- These are the buttons that can be easily undone -->
                <div class="digits">
                    <button class="digit">9</button>
                    <button class="digit">8</button>
                    <button class="digit">7</button>
                    <button class="digit">6</button>
                    <button class="digit">5</button>
                    <button class="digit">4</button>
                    <button class="digit">3</button>
                    <button class="digit">2</button>
                    <button class="digit">1</button>
                    <button class="digit">0</button>
                    <button id="decimal">.</button>
                    <button id="negate">-</button>
                </div>
                <div class="operations">
                    <button class="operation" id="add">+</button>
                    <button class="operation" id="subtract">—</button>
                    <button class="operation" id="multiply">x</button>
                    <button class="operation" id="dividee">/</button>
                </div>
                
            </div>
            <div class="bottom-bar">
                    <button id="clear">CLEAR</button>
                    <button id="backspace">BKSP</button>
                    <button id="equals">=</button>
            </div>
            
        </div>
    </div>
</body>
</html>
